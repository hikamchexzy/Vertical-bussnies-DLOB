<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>

<style>
body{
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f4f4;
}

.container{
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.switch{
  text-align:center;
  margin-top:10px;
  cursor:pointer;
  color:#2563eb;
}
</style>

</head>
<body>

<div class="container">

<h2 id="formTitle">Register</h2>

<!-- REGISTER FORM -->
<div id="registerForm">

<input id="regUsername" type="text" placeholder="Username">
<input id="regEmail" type="email" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p class="switch" onclick="showLogin()">Sudah punya akun? Login</p>

</div>

<!-- LOGIN FORM -->
<div id="loginForm" style="display:none;">

<input id="loginUsername" type="text" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="switch" onclick="showRegister()">Belum punya akun? Register</p>

</div>

</div>

<script>

function showLogin(){
  document.getElementById("registerForm").style.display="none";
  document.getElementById("loginForm").style.display="block";
  document.getElementById("formTitle").innerText="Login";
}

function showRegister(){
  document.getElementById("registerForm").style.display="block";
  document.getElementById("loginForm").style.display="none";
  document.getElementById("formTitle").innerText="Register";
}

function register(){

  const username=document.getElementById("regUsername").value;
  const email=document.getElementById("regEmail").value;
  const password=document.getElementById("regPassword").value;

  if(username=="" || email=="" || password==""){
    alert("Isi semua data!");
    return;
  }

  const user={
    username:username,
    email:email,
    password:password
  };

  localStorage.setItem("user",JSON.stringify(user));

  alert("Register berhasil!");

  showLogin();
}

function login(){

  const username=document.getElementById("loginUsername").value;
  const password=document.getElementById("loginPassword").value;

  const savedUser=JSON.parse(localStorage.getItem("user"));

  if(!savedUser){
    alert("Belum ada user yang terdaftar");
    return;
  }

  if(username===savedUser.username && password===savedUser.password){

    alert("Login berhasil!");

    localStorage.setItem("isLogin",true);

    window.location.href="dashboard.html";

  }else{
    alert("Username atau password salah");
  }

}

</script>

</body>
</html>
